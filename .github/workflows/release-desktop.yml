name: Release Desktop

# v2.0 Phase 2b: separate pipeline for the Linux-only desktop shell binary.
# Tag prefix `desktop-v*` keeps it independent of the App pipeline
# (release.yml, prefix `v*`) — a single `git push origin desktop-v2.0.0`
# only fires this workflow.
on:
  push:
    tags:
      - 'desktop-v*'
    branches:
      - 'release-trigger/desktop-**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. desktop-v2.0.0).'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Desktop is Linux-only by design — Phase 3 is meant to replace
        # GNOME Shell. Mac builds would be misleading.
        include:
          - platform: ubuntu-22.04
            args: ''
            label: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file pkg-config \
            libgtk-3-dev

      - name: Install npm dependencies
        working-directory: crates/salmon-desktop
        run: npm ci

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release-trigger/* ]]; then
            # Strip the leading "release-trigger/" — leave the rest intact
            # (e.g. release-trigger/desktop-v2.0.0-rc1 → desktop-v2.0.0-rc1).
            echo "tag=${GITHUB_REF#refs/heads/release-trigger/}" >> $GITHUB_OUTPUT
          else
            echo "tag=desktop-manual-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/salmon-desktop
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: 'SalmonApp Desktop ${{ steps.tag.outputs.tag }}'
          releaseBody: |
            **SalmonApp Desktop** — Ubuntu-style desktop shell (Linux only).

            Linux: install the `.deb`, or `chmod +x` and run the AppImage.

            Phase 2b: this binary currently ships the same React UI as
            the regular SalmonApp — the structural separation is in
            place but Phase 2d will give each binary its own frontend.
            For now use the in-app toggle to flip the home view.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
