# Salmon-themed swaylock — matches the desktop shell's accent palette
# so the lock screen reads as part of the same product, not a
# generic password prompt.
#
# Sourced via `swaylock -C /etc/salmon-desktop/swaylock.conf` from
# the salmon-session-action `lock` path. Colors are RRGGBBAA hex
# (alpha as the last two chars); names that take an RRGGBB are also
# accepted.

# Solid background — close to the dt-panel base. If the user wants
# their wallpaper behind the lock prompt, swaylock-effects or a
# screenshot grab via grim → swaylock --image is the next step.
color=080a12ff

# Typography
font=Ola Sans Compact, PingFang SC, sans-serif
font-size=18

# Indicator (the ring around the keystroke counter)
indicator
indicator-radius=110
indicator-thickness=6
indicator-caps-lock
show-failed-attempts

# Clock — surfaces the lock screen as a usable surface even before
# the user touches the keyboard.
clock
timestr=%H:%M
datestr=%a %m月%d日

# Ring states
ring-color=ff8a59
ring-ver-color=0d72ff
ring-wrong-color=ff3366
ring-clear-color=ff8a59

# Indicator interior (semi-transparent so the bg can hint through)
inside-color=12141788
inside-ver-color=0d72ff3a
inside-wrong-color=ff336640
inside-clear-color=12141788

# Text on the indicator
text-color=f5f5f7
text-ver-color=ffffff
text-wrong-color=ffffff
text-clear-color=ffe2c8
text-caps-lock-color=ffcf4d

# Highlights on keypress
key-hl-color=ff8a59
bs-hl-color=ff3366
caps-lock-key-hl-color=ffcf4d
caps-lock-bs-hl-color=ff3366

# Line above/below the indicator — match the inside so the indicator
# reads as a single inset chip rather than a stack.
line-color=00000000
line-ver-color=00000000
line-wrong-color=00000000

# Separator — invisible (we don't want a hard divider)
separator-color=00000000

# Layout
ignore-empty-password
